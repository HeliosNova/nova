services:
  ollama:
    image: ollama/ollama:0.17.5
    container_name: nova-ollama
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      OLLAMA_MAX_LOADED_MODELS: "3"
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_KEEP_ALIVE: "24h"
      # Default load timeout is 5m. A 27B Q4 (~17GB) loading fully onto the GPU
      # from this volume's disk takes ~10m; 20m gives headroom. Once loaded,
      # KEEP_ALIVE holds it resident so the slow load is a one-time cost.
      OLLAMA_LOAD_TIMEOUT: "20m"
      # Ollama 0.17.5 + qwen35 architecture on the OLD engine (default) does
      # NOT honor OLLAMA_NUM_PARALLEL — see startup log:
      #   "model architecture does not currently support parallel requests
      #    architecture=qwen35"
      # OLLAMA_NEW_ENGINE=true *does* enable parallel for qwen35 but the new
      # engine is less battle-tested for our throughput profile. Keep disabled
      # until proven; tests have to set num_parallel themselves if they care.
      OLLAMA_NEW_ENGINE: "true"
      # NEW_ENGINE=true honors NUM_PARALLEL for qwen35; old engine silently
      # ignored it. 4 lets multi-agent + parallel tool calls actually run
      # concurrently on the GPU instead of queuing serially.
      OLLAMA_NUM_PARALLEL: "4"
      # OLLAMA_NUM_CTX is also silently clamped by VRAM budget. The 9B Q8
      # model on 24GB lands at num_ctx=32768. Asking for 65536 is a no-op —
      # the model loads with 32K and Ollama logs a vram-default-context line.
      # Leaving the setting documents the ceiling we'd hit if we dropped to
      # Q4 or moved to a 48GB card; today the runtime delivers 32K.
      OLLAMA_NUM_CTX: "32768"
      # Required models (pull manually or via entrypoint):
      #   ollama pull qwen3.5:27b      (main model)
      #   ollama pull qwen3.5:9b       (vision model)
      #   ollama pull qwen3.5:4b       (fast model for routing)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: 32g
    volumes:
      - ollama_data:/root/.ollama
      # - C:/data/finetune/merged:/finetune-model:ro  # Temp mount for model import
    healthcheck:
      # `ollama list` alone passes whenever the CLI responds, even if the
      # production model failed to register or was deleted. Grep for the
      # expected production model so a missing/corrupt registry trips the
      # healthcheck. Accepts either nova-ft (fine-tuned) or a qwen3 base —
      # both are valid working states. Real inference probing happens from
      # nova-app via the `Ollama Latency Monitor` heartbeat, since the
      # Ollama image has no curl/wget/python for in-container API probes.
      test: ["CMD-SHELL", "ollama list | grep -q '^nova-ft' || ollama list | grep -q '^qwen3'"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  nova:
    build: .
    image: nova-app:latest
    container_name: nova-app
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
      searxng:
        condition: service_healthy
    # env_file passes LLM_PROVIDER, API keys, DISCORD_TOKEN, TELEGRAM_TOKEN, etc.
    env_file: .env
    environment:
      OLLAMA_URL: http://ollama:11434
      SEARXNG_URL: http://searxng:8080
      DB_PATH: /data/nova.db
      CHROMADB_PATH: /data/chromadb
      ANONYMIZED_TELEMETRY: "false"
      TRAINING_DATA_PATH: /data/training_data.jsonl
      MCP_CONFIG_DIR: /data/mcp
      ENABLE_SHELL_EXEC: "true"
      XDG_CACHE_HOME: /tmp/.cache
      DISPLAY: ":99"  # Xvfb virtual display for desktop automation
      XAUTHORITY: /tmp/.Xauthority
      ENABLE_DESKTOP_AUTOMATION: "true"
      ENABLE_PLANNING: "true"
      ENABLE_CRITIQUE: "true"
      # Auto-finetune: heartbeat fires DPO training when ≥50 new pairs accumulate.
      # Stops Ollama for 30-60 min during training; the script reruns A/B and
      # rolls back on regression so chat is unavailable but never gets worse.
      ENABLE_AUTO_FINETUNE: "true"
      # MCP: expose Nova as MCP server (for Claude Code/Cursor) and consume
      # external MCP tools. Both default-on now that auto-finetune protects model quality.
      ENABLE_MCP: "true"
      ENABLE_MCP_SERVER: "true"
      # Voice: Whisper STT + Piper TTS (both already installed in image).
      ENABLE_VOICE: "true"
      ENABLE_TTS: "true"
      # Eval-suite per-task timeouts were sized for the 9B base. Production
      # runs the 9B nova-ft, so 1.5× is enough headroom (nova-ft + tool calls
      # run a bit slower than the bare 9B). Raise to 2.5 only when a 27B base
      # is loaded — at 2.5 a runaway task can burn 300s before failing.
      EVAL_TIMEOUT_MULTIPLIER: "1.5"
    volumes:
      - nova_data:/data
      - ./mcp:/data/mcp:ro
      # /home/nova/.cache as tmpfs mounted with mode 1777 so nova (uid 1000)
      # can write ChromaDB's internal cache. Short-form tmpfs defaults to mode
      # 755/root — use long-form volume syntax instead.
      - type: tmpfs
        target: /home/nova/.cache
        tmpfs:
          size: 536870912
          mode: 1023  # 01777 octal = 1023 decimal (world-writable + sticky)
      # Uncomment for desktop automation (requires X11 on host):
      # - /tmp/.X11-unix:/tmp/.X11-unix:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 4g
    cpus: 4.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: dev
    image: nova-frontend:latest
    container_name: nova-frontend
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      nova:
        condition: service_healthy
    environment:
      # Browser-accessible URL (not internal docker network name)
      VITE_API_URL: http://localhost:8000
      # Allow internal Docker hostnames for inter-container access
      __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS: nova-frontend
    volumes:
      - ./frontend/src:/app/src        # hot-reload source changes
      - ./frontend/index.html:/app/index.html
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: nova-searxng
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    mem_limit: 384m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  ollama_data:
  nova_data:
