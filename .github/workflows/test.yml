name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify import chain (catch missing deps early)
        run: |
          python -c "import app.core.skills; import app.core.brain; import app.monitors.heartbeat"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --ignore=tests/test_mcp_server.py
        env:
          DB_PATH: ":memory:"
          CHROMADB_PATH: /tmp/chromadb_test
          OLLAMA_URL: http://localhost:11434
          SEARXNG_URL: http://localhost:8080
          TRAINING_DATA_PATH: /tmp/training_data.jsonl
          MAX_SYSTEM_TOKENS: "6000"
